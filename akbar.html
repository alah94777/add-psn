<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3Games - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-red: #dc2626;
            --hover-red: #b91c1c;
            --pure-white: #ffffff;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); padding: 20px; min-height: 100vh; }
        .admin-container { width: 100%; max-width: 1000px; margin: 0 auto; background: var(--pure-white); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 2px solid rgba(220, 38, 38, 0.1); overflow: hidden; }
        .header { background: linear-gradient(135deg, #1e293b, #0f172a); color: var(--pure-white); padding: 25px; text-align: center; }
        
        .control-box { padding: 20px; background: #f1f5f9; display: flex; flex-direction: column; gap: 15px; border-bottom: 2px solid #e2e8f0; }
        @media(min-width: 768px) { .control-box { flex-direction: row; justify-content: space-between; align-items: center; } }
        
        .toggle-btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; color: white; transition: 0.3s; }
        .btn-off { background: #cbd5e1; color: #1e293b; }
        .btn-on { background: var(--primary-red); }

        .add-player-section { background: #ffffff; padding: 20px; margin: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 10px; }
        @media(min-width: 768px) { .form-grid { grid-template-columns: 1fr 1fr auto; } }
        .form-grid input { padding: 10px 12px; border: 2px solid #e2e8f0; border-radius: 6px; font-size: 14px; outline: none; }
        .btn-add-submit { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }

        .content-grid { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 0 20px 20px 20px; }
        @media(min-width: 900px) { .content-grid { grid-template-columns: 2fr 1fr; } }
        .section-title { font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .table-wrapper { overflow-x: auto; background: white; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }
        th { background: #f8fafc; font-weight: 600; }
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; color: white; display: inline-flex; align-items: center; gap: 4px; }
        
        .btn-action { padding: 6px 10px; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: 600; color: white; margin: 2px; }
        .btn-delete { background: #ef4444; }
        .btn-banned { background: #f97316; }
        .btn-unban { background: #10b981; }
        .btn-tag { background: #3b82f6; }
        
        .banned-box { background: #fff5f5; border: 1px solid #fee2e2; border-radius: 8px; padding: 15px; }
        .banned-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed #fca5a5; font-size: 13px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .modal-content select, .modal-content input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; outline: none; }
        
        .icon-preview-area { background: #f1f5f9; padding: 10px; border-radius: 6px; text-align: center; margin-bottom: 12px; font-size: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="header">
            <h1><i class="fa-solid fa-user-shield"></i> P3GAMES Panel Admin Pro</h1>
        </div>

        <div class="control-box">
            <div>
                <h3 style="font-size: 15px;">Status Maintenance Website (`index.html`)</h3>
                <p style="font-size: 12px; color: var(--text-muted);">Aktifkan untuk menutup akses form mabar depan.</p>
            </div>
            <button id="maintenanceBtn" class="toggle-btn btn-off" onclick="toggleMaintenance()">OFF</button>
        </div>

        <div class="add-player-section">
            <h3 style="font-size: 15px; display: flex; align-items: center; gap: 8px;"><i class="fa-solid fa-user-plus" style="color:#10b981"></i> Tambah Player Manual</h3>
            <form id="adminAddPlayerForm">
                <div class="form-grid">
                    <input type="text" id="adminInputNama" placeholder="Nama Player" required maxlength="20">
                    <input type="text" id="adminInputPsn" placeholder="ID PSN" required maxlength="30">
                    <button type="submit" class="btn-add-submit"><i class="fa-solid fa-plus"></i> Tambah Data</button>
                </div>
            </form>
        </div>

        <div class="content-grid">
            <div>
                <h2 class="section-title"><i class="fa-solid fa-users"></i> Manajemen Player (Sorted by XP Hierarchy)</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Nama</th>
                                <th>ID PSN</th>
                                <th>Pangkat / Tag</th>
                                <th style="text-align: center;">Kontrol Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="adminPlayerList"></tbody>
                    </table>
                </div>
            </div>

            <div>
                <h2 class="section-title"><i class="fa-solid fa-ban"></i> Ruang Banned</h2>
                <div class="banned-box"><div id="adminBannedList"></div></div>
            </div>
        </div>
    </div>

    <div id="tagModal" class="modal">
        <div class="modal-content">
            <h3><i class="fa-solid fa-tags"></i> Berikan Pangkat & Atur Urutan XP</h3>
            <input type="hidden" id="targetPlayerKey">
            
            <label style="font-size:12px; font-weight:600;">Pilih Template Pangkat:</label>
            <select id="tagTemplate" onchange="handleTemplateChange()">
                <option value="Member|fa-user|#64748b|10">Member (XP: 10 👥)</option>
                <option value="Admin|fa-user-shield|#dc2626|90">Admin (XP: 90 👑)</option>
                <option value="Developer|fa-code|#10b981|100">Developer (XP: 100 🛠️)</option>
                <option value="custom">-- Buat Tag Custom Sendiri --</option>
            </select>

            <div class="icon-preview-area" id="iconPreviewBox">
                Preview: <span id="liveBadgePreview" class="badge" style="background:#64748b"><i class="fa-solid fa-user" id="liveIcon"></i> <span id="liveText">Member</span></span>
            </div>

            <div id="customTagForm" style="display:none;">
                <label style="font-size:12px; font-weight:600;">Nama Tag Custom:</label>
                <input type="text" id="customTagName" placeholder="Contoh: MVP" oninput="updateLivePreview()">
                
                <label style="font-size:12px; font-weight:600;">Icon FontAwesome:</label>
                <input type="text" id="customTagIcon" value="fa-star" placeholder="fa-star" oninput="updateLivePreview()">
                
                <label style="font-size:12px; font-weight:600;">Set Bobot Urutan Posisi (XP):</label>
                <input type="number" id="customTagXp" value="50" placeholder="Semakin tinggi, posisi makin di atas">

                <label style="font-size:12px; font-weight:600;">Warna Badge:</label>
                <input type="color" id="customTagColor" value="#3b82f6" onchange="updateLivePreview()">
            </div>

            <div class="modal-actions">
                <button class="btn-action" style="background:#cbd5e1; color:#1e293b" onclick="closeTagModal()">Batal</button>
                <button class="btn-action btn-tag" onclick="savePlayerTag()">Terapkan Tag</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDdqcklee7hmqdR2PrMUsxR1M9UD9K5YKQ",
            authDomain: "p3games.firebaseapp.com",
            databaseURL: "https://p3games-default-rtdb.firebaseio.com",
            projectId: "p3games",
            appId: "1:695625303781:web:31e4e065ff28f58e28b60c"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const playersRef = database.ref('players');
        const systemRef = database.ref('system_status');

        let isMaintenanceActive = false;

        systemRef.child('maintenance').on('value', (snapshot) => {
            const btn = document.getElementById('maintenanceBtn');
            isMaintenanceActive = snapshot.exists() && snapshot.val() === true;
            btn.innerText = isMaintenanceActive ? "ON" : "OFF";
            btn.className = isMaintenanceActive ? "toggle-btn btn-on" : "toggle-btn btn-off";
        });

        function toggleMaintenance() { systemRef.update({ maintenance: !isMaintenanceActive }); }

        document.getElementById('adminAddPlayerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const namaInput = document.getElementById('adminInputNama').value.trim();
            const psnIdInput = document.getElementById('adminInputPsn').value.trim();

            playersRef.orderByChild('psnId').equalTo(psnIdInput).once('value', (snapshot) => {
                if (snapshot.exists()) {
                    let keyToUpdate = Object.keys(snapshot.val())[0];
                    playersRef.child(keyToUpdate).update({ nama: namaInput, status: 'active', timestamp: firebase.database.ServerValue.TIMESTAMP });
                } else {
                    playersRef.push({ nama: namaInput, psnId: psnIdInput, status: 'active', tag: { name: 'Member', icon: 'fa-user', color: '#64748b', xp: 10 }, timestamp: firebase.database.ServerValue.TIMESTAMP });
                }
                alert("Berhasil disimpan!"); document.getElementById('adminAddPlayerForm').reset();
            });
        });

        playersRef.on('value', (snapshot) => {
            const tbody = document.getElementById('adminPlayerList');
            const bannedDiv = document.getElementById('adminBannedList');
            tbody.innerHTML = ''; bannedDiv.innerHTML = '';
            
            if (snapshot.exists()) {
                const data = snapshot.val();
                const sortedKeys = Object.keys(data).sort((a,b) => {
                    const xpA = (data[a].tag && data[a].tag.xp) ? parseInt(data[a].tag.xp) : 10;
                    const xpB = (data[b].tag && data[b].tag.xp) ? parseInt(data[b].tag.xp) : 10;
                    return xpB - xpA;
                });

                sortedKeys.forEach((key) => {
                    const player = data[key];
                    let tagHtml = `<span class="badge" style="background:#64748b"><i class="fa-solid fa-user"></i> Member</span>`;
                    if(player.tag) {
                        tagHtml = `<span class="badge" style="background:${player.tag.color}"><i class="fa-solid ${player.tag.icon}"></i> ${escapeHTML(player.tag.name)}</span>`;
                    }

                    if (player.status === 'banned') {
                        const div = document.createElement('div'); div.classList.add('banned-item');
                        div.innerHTML = `<span><b>${escapeHTML(player.psnId)}</b> (${escapeHTML(player.nama)})</span><button class="btn-action btn-unban" onclick="database.ref('players/${key}').update({status:'active'})">Unban</button>`;
                        bannedDiv.appendChild(div);
                    } else {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><b>${escapeHTML(player.nama)}</b></td>
                            <td>${escapeHTML(player.psnId)}</td>
                            <td>${tagHtml}</td>
                            <td style="text-align: center;">
                                <button class="btn-action btn-tag" onclick="openTagModal('${key}')">Tag</button>
                                <button class="btn-action btn-banned" onclick="database.ref('players/${key}').update({status:'banned'})">Ban</button>
                                <button class="btn-action btn-delete" onclick="if(confirm('Hapus?')) database.ref('players/${key}').remove()">Hapus</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    }
                });
            }
        });

        function openTagModal(key) {
            document.getElementById('targetPlayerKey').value = key;
            document.getElementById('tagTemplate').value = "Member|fa-user|#64748b|10";
            handleTemplateChange();
            document.getElementById('tagModal').style.display = 'flex';
        }
        function closeTagModal() { document.getElementById('tagModal').style.display = 'none'; }
        
        function handleTemplateChange() {
            const val = document.getElementById('tagTemplate').value;
            if(val === 'custom') {
                document.getElementById('customTagForm').style.display = 'block';
                updateLivePreview();
            } else {
                document.getElementById('customTagForm').style.display = 'none';
                const parts = val.split('|');
                document.getElementById('liveBadgePreview').style.background = parts[2];
                document.getElementById('liveIcon').className = `fa-solid ${parts[1]}`;
                document.getElementById('liveText').innerText = parts[0];
            }
        }

        document.getElementById('tagTemplate').addEventListener('change', handleTemplateChange);

        function updateLivePreview() {
            const name = document.getElementById('customTagName').value.trim() || 'Custom';
            const icon = document.getElementById('customTagIcon').value.trim() || 'fa-star';
            const color = document.getElementById('customTagColor').value;
            
            document.getElementById('liveBadgePreview').style.background = color;
            document.getElementById('liveIcon').className = `fa-solid ${icon}`;
            document.getElementById('liveText').innerText = name;
        }

        function savePlayerTag() {
            const key = document.getElementById('targetPlayerKey').value;
            const template = document.getElementById('tagTemplate').value;
            let tagName, tagIcon, tagColor, tagXp;

            if(template === 'custom') {
                tagName = document.getElementById('customTagName').value.trim() || 'Custom';
                tagIcon = document.getElementById('customTagIcon').value.trim() || 'fa-star';
                tagColor = document.getElementById('customTagColor').value;
                tagXp = parseInt(document.getElementById('customTagXp').value) || 50;
            } else {
                const parts = template.split('|');
                tagName = parts[0]; tagIcon = parts[1]; tagColor = parts[2]; tagXp = parseInt(parts[3]);
            }

            playersRef.child(key).child('tag').set({ name: tagName, icon: tagIcon, color: tagColor, xp: tagXp }).then(() => { closeTagModal(); });
        }

        function escapeHTML(str) { return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)); }
    </script>
</body>
</html>
