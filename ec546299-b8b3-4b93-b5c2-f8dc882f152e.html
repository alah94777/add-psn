<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3Games - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-red: #dc2626;
            --hover-red: #b91c1c;
            --pure-white: #ffffff;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); padding: 20px; min-height: 100vh; }
        .admin-container { width: 100%; max-width: 900px; margin: 0 auto; background: var(--pure-white); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 2px solid rgba(220, 38, 38, 0.1); overflow: hidden; }
        .header { background: linear-gradient(135deg, #1e293b, #0f172a); color: var(--pure-white); padding: 25px; text-align: center; }
        .header h1 { font-size: 22px; }
        
        /* Control Panel Maintenance */
        .control-box { padding: 20px; background: #f1f5f9; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; }
        .toggle-btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; color: white; transition: 0.3s; }
        .btn-off { background: #cbd5e1; color: #1e293b; }
        .btn-on { background: var(--primary-red); }

        /* Main Content Grid */
        .content-grid { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 20px; }
        @media(min-width: 768px) { .content-grid { grid-template-columns: 2fr 1fr; } }

        .section-title { font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        
        /* Table & Lists */
        .table-wrapper { overflow-x: auto; background: white; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: 600; }
        
        /* Action Buttons */
        .btn-action { padding: 6px 12px; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: 600; margin-right: 5px; color: white; transition: 0.2s; }
        .btn-delete { background: #ef4444; }
        .btn-delete:hover { background: #b91c1c; }
        .btn-banned { background: #f97316; }
        .btn-banned:hover { background: #ea580c; }
        .btn-unban { background: #10b981; }

        /* Banned List Box */
        .banned-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; }
        .banned-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed #cbd5e1; font-size: 13px; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="header">
            <h1><i class="fa-solid fa-user-shield"></i> P3GAMES Panel Admin</h1>
        </div>

        <div class="control-box">
            <div>
                <h3 style="font-size: 15px;">Status Maintenance Website (`index.html`)</h3>
                <p style="font-size: 12px; color: var(--text-muted);">Jika diaktifkan, user tidak bisa mengisi/melihat daftar mabar.</p>
            </div>
            <button id="maintenanceBtn" class="toggle-btn btn-off" onclick="toggleMaintenance()">OFF</button>
        </div>

        <div class="content-grid">
            <div>
                <h2 class="section-title"><i class="fa-solid fa-users"></i> Daftar Player Aktif</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Nama</th>
                                <th>ID PSN</th>
                                <th style="text-align: center;">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="adminPlayerList">
                            </tbody>
                    </table>
                </div>
            </div>

            <div>
                <h2 class="section-title"><i class="fa-solid fa-ban"></i> User Diblokir</h2>
                <div class="banned-box">
                    <div id="adminBannedList">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // Konfigurasi Firebase (Sama Persis dengan index.html)
        const firebaseConfig = {
            apiKey: "AIzaSyDdqcklee7hmqdR2PrMUsxR1M9UD9K5YKQ",
            authDomain: "p3games.firebaseapp.com",
            databaseURL: "https://p3games-default-rtdb.firebaseio.com",
            projectId: "p3games",
            appId: "1:695625303781:web:31e4e065ff28f58e28b60c"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        const playersRef = database.ref('players');
        const bannedRef = database.ref('banned_users');
        const systemRef = database.ref('system_status');

        let isMaintenanceActive = false;

        // 1. MONITOR & KONTROL STATUS MAINTENANCE
        systemRef.child('maintenance').on('value', (snapshot) => {
            const btn = document.getElementById('maintenanceBtn');
            if (snapshot.exists() && snapshot.val() === true) {
                isMaintenanceActive = true;
                btn.innerText = "ON (Maintenance)";
                btn.className = "toggle-btn btn-on";
            } else {
                isMaintenanceActive = false;
                btn.innerText = "OFF (Normal)";
                btn.className = "toggle-btn btn-off";
            }
        });

        function toggleMaintenance() {
            systemRef.update({
                maintenance: !isMaintenanceActive
            });
        }

        // 2. TAMPILKAN PLAYER AKTIF & AKSI DELETE / BAN
        playersRef.on('value', (snapshot) => {
            const tbody = document.getElementById('adminPlayerList');
            tbody.innerHTML = '';
            
            if (snapshot.exists()) {
                const data = snapshot.val();
                Object.keys(data).forEach((key) => {
                    const player = data[key];
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><b>${escapeHTML(player.nama)}</b></td>
                        <td><i class="fa-brands fa-playstation" style="color:#003087"></i> ${escapeHTML(player.psnId)}</td>
                        <td style="text-align: center;">
                            <button class="btn-action btn-banned" onclick="banUser('${key}', '${escapeHTML(player.psnId)}')"><i class="fa-solid fa-ban"></i> Ban</button>
                            <button class="btn-action btn-delete" onclick="deleteUser('${key}')"><i class="fa-solid fa-trash"></i> Hapus</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:var(--text-muted);">Tidak ada player aktif.</td></tr>';
            }
        });

        // 3. TAMPILKAN LIST USER YANG DIBANNED
        bannedRef.on('value', (snapshot) => {
            const listDiv = document.getElementById('adminBannedList');
            listDiv.innerHTML = '';
            
            if (snapshot.exists()) {
                const data = snapshot.val();
                Object.keys(data).forEach((key) => {
                    const bannedPsn = data[key];
                    const div = document.createElement('div');
                    div.classList.add('banned-item');
                    div.innerHTML = `
                        <span><i class="fa-brands fa-playstation"></i> <s>${escapeHTML(bannedPsn)}</s></span>
                        <button class="btn-action btn-unban" onclick="unbanUser('${key}')"><i class="fa-solid fa-circle-check"></i> Unban</button>
                    `;
                    listDiv.appendChild(div);
                });
            } else {
                listDiv.innerHTML = '<p style="font-size:12px; color:var(--text-muted); text-align:center;">Belum ada user dibanned.</p>';
            }
        });

        // FUNGSI AKSI ADMIN
        function deleteUser(key) {
            if(confirm("Hapus ID Player ini dari daftar?")) {
                playersRef.child(key).remove();
            }
        }

        function banUser(key, psnId) {
            if(confirm(`Blokir ID PSN: ${psnId}? User ini tidak akan bisa submit lagi.`)) {
                // Tambah ke daftar banned
                bannedRef.push(psnId).then(() => {
                    // Hapus data aktifnya
                    playersRef.child(key).remove();
                });
            }
        }

        function unbanUser(key) {
            if(confirm("Pulihkan akun ini agar bisa mabar lagi?")) {
                bannedRef.child(key).remove();
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }
    </script>
</body>
</html>
